decks:
  - slug: ai-gptoss2b-pharmacy-basics
    title: Pharmacy Basics
    description: Practical English for buying medicine and asking simple health questions.
    topic: beginner English for pharmacy visits and basic health needs
    difficulty: beginner
    desired_card_count: 20
    batch_size: 10
    model: gpt-oss:2b
    fallback_models:
      - gpt-oss:20b
      - qwen3.5:latest
      - gemma3:4b
    overwrite_mode: fail
    learner_profile: Spanish-speaking beginners who need practical English in a pharmacy or drugstore.
    generation_notes: Keep vocabulary concrete, high-frequency, and useful for short in-person interactions.
    vocabulary_focus:
      - medicine
      - pain
      - cough
      - fever
      - simple requests
    excluded_vocabulary:
      - medical research terms
      - hospital administration jargon
    sections:
      - name: Asking for help
        communicative_goal: Ask for medicine, describe a simple symptom, and understand basic pharmacy questions.
        lexical_focus:
          - headache
          - cough
          - sore throat
          - pharmacy
          - need
        target_card_count: 10
      - name: Buying and instructions
        communicative_goal: Buy a product and understand simple directions about using it.
        lexical_focus:
          - tablet
          - syrup
          - twice a day
          - after meals
          - receipt
        target_card_count: 10

