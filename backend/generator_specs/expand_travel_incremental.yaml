decks:
  - slug: travel
    title: Travel Phrases
    description: Short phrases for transport, directions, and common travel moments.
    topic: airport travel basics
    difficulty: beginner
    desired_card_count: 20
    batch_size: 6
    model: qwen3.5:latest
    fallback_models:
      - gemma3:4b
      - llama3.1:latest
    overwrite_mode: append
    learner_profile: Spanish-speaking adults who need practical English for common travel situations.
    generation_notes: Generate only high-frequency travel vocabulary as single words or very short expressions. Avoid duplicates of common seed cards.
    excluded_vocabulary:
      - Aeropuerto
      - ¿Dónde está la estación?
      - Billete
      - Maleta
      - Estoy perdido
    sections:
      - name: Airport basics
        communicative_goal: Handle check-in, boarding, and common airport signs.
        lexical_focus:
          - passport
          - boarding pass
          - gate
          - delay
          - luggage
        target_card_count: 20

