decks:
  - slug: daily-life
    title: Daily Life
    description: Useful vocabulary for routines, places, and simple actions.
    topic: morning routine and everyday habits
    difficulty: beginner
    desired_card_count: 20
    batch_size: 6
    model: qwen3.5:latest
    fallback_models:
      - gemma3:4b
      - llama3.1:latest
    overwrite_mode: append
    learner_profile: Spanish-speaking adults who want practical English for everyday life and simple conversations.
    generation_notes: Generate only high-frequency daily vocabulary as single words or very short expressions. Avoid duplicates of common seed cards.
    excluded_vocabulary:
      - Trabajo
      - Comida
      - Casa
      - Caminar
      - Necesito ayuda
    sections:
      - name: Morning and daily routine
        communicative_goal: Talk about waking up, getting ready, and everyday habits.
        lexical_focus:
          - wake up
          - shower
          - breakfast
          - get dressed
          - leave home
        target_card_count: 20

